<html>
  <head>
    <meta name='viewport' content='width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, shrink-to-fit=no'/>
    <style type="text/css">
      html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        min-width: 100%;
        min-height: 100%;
        background-color: #1a1a1a; /* ปรับสีพื้นหลังให้ดูพรีเมียมขึ้น */
        overflow: hidden; /* ป้องกัน scrollbar กวนใจ */
      }

      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }

      #output {
        margin: 0;
        padding: 0;
      }
    </style>
  </head>
  <body>
    <p id="output">
      <canvas id="canvas"></canvas>
    </p>

    <script>
      var siteURL = new URL(window.location.href);
      var w = siteURL.searchParams.get("w") || "800";
      var h = siteURL.searchParams.get("h") || "480";
      var canvas = document.getElementById('canvas');
      
      canvas.setAttribute("width", w);
      canvas.setAttribute("height", h);
      
      console.log("🚀 BlynkGO Dashboard: " + w + "x" + h + " px");

      var Module = {
        print: function(text) { console.log(text); },
        printErr: function(text) { console.error(text); },
        canvas: (function() { return canvas; })(),
        arguments: [ w, h, siteURL.searchParams.get("example") ?? "default" ]
      };

      // --- [ส่วนที่เพิ่มใหม่: ระบบ Event Bridge] ---
      window.addEventListener("blynkgo_data", function(e) {
          const { key, value } = e.detail;
          
          // 1. Default System Handler (คุณใส่ไว้ให้)
          if(key === "sys_ready") console.log("✅ BlynkGO Core is ready.");

          // 2. User Logic Hook (เรียกฟังก์ชันที่ User จะเขียนข้างล่าง)
          if (typeof onBlynkGOData === 'function') {
              onBlynkGOData(key, value);
          }
      });

      window.addEventListener("click", () => window.focus());
    </script>

    <script async type="text/javascript" src="index.js"></script>

    <script id="user-logic">
      /**
       * CUSTOMER SECTION: 
       * แก้ไข Logic การรับค่าจาก BlynkGO (C++) ได้ที่นี่
       */

          // ตัวอย่างการใช้งาน:
          // if (key === "btn_alarm") {
          //     alert("แจ้งเตือนจากระบบ: " + value);
          // }
          
          // if (key === "bg_color") {
          //     document.body.style.backgroundColor = value;
          // }

          // console.log("📥 User Received:", key, "=>", value);
      }
    </script>
  </body>
</html>
